name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: julep_gui-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: julep_gui-darwin-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            binary: julep_gui-darwin-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: julep_gui-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --manifest-path native/julep_gui/Cargo.toml --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp native/julep_gui/target/${{ matrix.target }}/release/julep_gui ${{ matrix.binary }}
          sha256sum ${{ matrix.binary }} > ${{ matrix.binary }}.sha256

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item native/julep_gui/target/${{ matrix.target }}/release/julep_gui.exe ${{ matrix.binary }}
          (Get-FileHash ${{ matrix.binary }} -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.binary }}" | Out-File ${{ matrix.binary }}.sha256 -Encoding ascii

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.binary }}
            ${{ matrix.binary }}.sha256

  publish-hex:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17'
          otp-version: '27'

      - name: Install dependencies
        run: mix deps.get

      - name: Publish to Hex
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes
